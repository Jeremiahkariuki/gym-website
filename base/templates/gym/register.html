{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro | Member Registration</title>
    <link rel="stylesheet" href="{% static 'gym/css/register.css' %}">
</head>

<body>

    <div class="standalone-auth">
        <h2>Gym Pro System</h2>
        <h3>Create an Account</h3>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="errorlist">
                    {{ field.errors }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn">Register</button>
        </form>

        <p class="auth-links">
            Already have an account? <br><br>
            <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>

</body>

</html>
