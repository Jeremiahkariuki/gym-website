{% extends 'gym/base.html' %}

{% block title %}Add Exercise{% endblock %}

{% block content %}
<a href="{% url 'workout_plan_detail' workout.id %}" class="back-link">← Back to {{ workout.name }}</a>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Add Exercise to {{ workout.name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
            {{ form.as_p }}
        </div>
        <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
            <a href="{% url 'workout_plan_detail' workout.id %}" class="btn"
                style="background: var(--bg-secondary); color: var(--text-color); border: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; flex: 1;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
