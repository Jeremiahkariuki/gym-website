{% extends 'gym/base.html' %}

{% block title %}Delete Exercise{% endblock %}

{% block content %}
<a href="{% url 'workout_plan_detail' exercise.workout_plan.id %}" class="back-link">← Back to Workout Plan</a>

<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2 style="color: var(--danger-color);">Delete Exercise</h2>
    <p>Are you sure you want to delete the exercise "<strong>{{ exercise.name }}</strong>"?</p>

    <form method="POST" style="margin-top: 2rem;">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'workout_plan_detail' exercise.workout_plan.id %}" class="btn">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </div>
    </form>
</div>
{% endblock %}
