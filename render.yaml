services:
  - type: web
    name: gym-management-system
    runtime: python
    plan: free
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn gym.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Set this to your custom domain later for better security

databases:
  - name: gym-db
    plan: free
